<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e14" />
  <title>PULSE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #0a0e14;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: manipulation; user-select: none; -webkit-user-select: none;
      overscroll-behavior: none; position: fixed;
    }
    #game { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
    /* 화면 어디를 눌러도 탭이 되도록 뷰포트 전체를 덮는 캐처.
       iOS/임베드 환경에서 window 레벨 이벤트가 안 오는 경우에도
       리스너가 달린 요소 직접 탭은 항상 동작한다. */
    #tap-catcher { position: fixed; inset: 0; z-index: 1; cursor: pointer; touch-action: none; }
    #ui { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    .screen {
      position: absolute; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; color: #e8f0ff;
      text-align: center; padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .screen.show { display: flex; }
    .btn {
      pointer-events: auto; border: none; border-radius: 14px; cursor: pointer;
      font-size: 17px; font-weight: 700; padding: 15px 30px; min-width: 230px;
      color: #0a0e14; background: #27e8a7; transition: transform .08s;
    }
    .btn:active { transform: scale(0.95); }
    .btn.ghost { background: rgba(232,240,255,.12); color: #e8f0ff; }
    .btn.gold { background: #ffd166; }
    #ad-overlay {
      position: absolute; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(4,6,10,.94); color: #e8f0ff; z-index: 10; text-align: center; padding: 24px;
    }
    #ad-overlay.show { display: flex; }
    #ad-count { font-size: 64px; font-weight: 800; color: #27e8a7; font-variant-numeric: tabular-nums; }
    .dim { color: rgba(232,240,255,.55); font-size: 14px; }
    .weapon-row {
      pointer-events: auto; display: flex; align-items: center; gap: 12px;
      width: min(320px, 86vw); padding: 12px 16px; border-radius: 12px;
      background: rgba(232,240,255,.07); cursor: pointer; text-align: left;
    }
    .weapon-row.equipped { outline: 2px solid #27e8a7; }
    .weapon-row .w-name { flex: 1; font-size: 15px; font-weight: 700; }
    .weapon-row .w-price { font-size: 13px; color: #ffd166; font-variant-numeric: tabular-nums; }
    .weapon-row.locked { opacity: .75; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="tap-catcher"></div>
  <div id="ui"></div>
  <div id="ad-overlay">
    <div class="dim">보상형 광고 (웹 데모 대체)</div>
    <div id="ad-count">3</div>
    <button class="btn ghost" id="ad-skip">건너뛰기 (보상 없음)</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
